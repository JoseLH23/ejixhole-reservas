name: Smoke - Portal desplegado

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: URL HTTPS del portal sin barra final
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Comprobar sitio y ruta de reservación
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          case "$BASE_URL" in https://*) ;; *) exit 1 ;; esac
          curl --fail --silent --show-error --retry 3 --retry-all-errors "$BASE_URL/" > index.html
          grep -qi '<div id="root"' index.html
          grep -qi '<script' index.html
      - uses: actions/upload-artifact@v7
        with:
          name: reservas-smoke-${{ github.run_id }}
          path: index.html
          retention-days: 30
