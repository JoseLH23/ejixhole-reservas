name: Security - Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 9 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Detectar secretos en historial
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar historial completo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
