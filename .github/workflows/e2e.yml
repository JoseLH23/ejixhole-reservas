name: E2E - Portal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm install --no-save --no-package-lock @playwright/test@1.61.1 @axe-core/playwright@4.12.1
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: portal-playwright-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
